{% extends 'myapp/base.html' %}

{% block body %}

<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

        <!-- Heading -->
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome back 👋</h1>
        <p class="text-gray-500 mb-8">Login to continue</p>

        <!-- Error Box -->
        {% if form.non_field_errors %}
            <div class="bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded-lg mb-6">
                {% for error in form.non_field_errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Username
                </label>
                <input type="text" name="username"
                       class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-black focus:outline-none"
                       placeholder="Enter your username" required>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input type="password" name="password"
                       class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-black focus:outline-none"
                       placeholder="Enter your password" required>
            </div>

            <!-- Submit -->
            <button type="submit"
                class="w-full bg-black text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
                Login
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            New user? <a href="{% url 'users:register' %}">Signup.</a><br>
            Forgot password? Contact admin
            
        </p>
    </div>

</div>

{% endblock %}
