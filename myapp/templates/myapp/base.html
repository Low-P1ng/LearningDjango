<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <nav class="bg-blue-400 text-white">
        <div class="flex justify-between px-2 py-4">
            <div>
                <a  class="font-bold text-2xl" href="{% url 'myapp:index' %}">Food App</a>
                <a  href="{% url 'myapp:create_item' %}">Add item</a>
            </div>
            <div class="space-x-5">
                <a href="{% url 'users:profile' %}">Welcome {{user.username}}</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'users:logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'users:login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    {% if messages %}
    {% for message in messages%}
        <div class="bg-green-300 text-green-700">
            {{message}}
        </div>
    {% endfor %}
    {% endif %}
    {% block body%}
    {% endblock %}
</body>
</html>
