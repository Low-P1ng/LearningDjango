{% extends 'myapp/base.html' %}
{% block body %}

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto py-10">

    {% for item in item_list %}
    <div class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition duration-300 overflow-hidden">

        <!-- Image -->
        <img class="w-full h-56 object-cover"
             src="{{ item.item_image }}"
             alt="{{ item.item_name }}">

        <!-- Content -->
        <div class="p-6 space-y-3">
            <h2 class="text-2xl font-bold">{{ item.item_name }}</h2>
            <p class="text-gray-600">{{ item.item_desc }}</p>
            <p class="text-gray-600">{{ item.user_name }}</p>

            <div class="flex items-center justify-between pt-4">
                <span class="text-green-600 font-bold text-xl">₹{{ item.item_price }}</span>

                <a href="{% url 'myapp:detail' item.id %}"
                   class="bg-red-500 text-white px-5 py-2 rounded-full hover:bg-red-600 transition whitespace-nowrap">
                    View details
                </a>
            </div>
        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
